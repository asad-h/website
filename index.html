<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>0xsloane</title>
<meta name="description" content="Liquid trader and venture investor in crypto. Building in public.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html {
    font-size: 14px;
    -webkit-font-smoothing: antialiased;
  }

  body {
    font-family: 'JetBrains Mono', 'Courier New', monospace;
    background: #fafafa;
    color: #444;
    line-height: 1.8;
    min-height: 100vh;
    opacity: 0;
    animation: fadeIn 0.6s ease-out 0.1s forwards;
  }

  @keyframes fadeIn {
    to { opacity: 1; }
  }

  .screen {
    max-width: 720px;
    margin: 0 auto;
    padding: 48px 24px 120px;
  }

  /* header */
  .topbar {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 64px;
    padding: 24px 0 28px;
    border-bottom: 1px solid #e0e0e0;
  }

  .topbar .handle {
    font-size: 1.4rem;
    font-weight: 500;
    color: #111;
    letter-spacing: -0.02em;
  }

  /* sections */
  .block {
    margin-bottom: 52px;
    padding-left: 16px;
    border-left: 1px solid #e0e0e0;
    opacity: 0;
    transform: translateY(12px);
    animation: sectionIn 0.5s ease-out forwards;
  }

  .block:nth-child(2) { animation-delay: 0.15s; }
  .block:nth-child(3) { animation-delay: 0.25s; }
  .block:nth-child(4) { animation-delay: 0.35s; }
  .block:nth-child(5) { animation-delay: 0.45s; }

  @keyframes sectionIn {
    to { opacity: 1; transform: translateY(0); }
  }

  .block-header {
    font-size: 0.72rem;
    color: #bbb;
    letter-spacing: 0.08em;
    margin-bottom: 14px;
    text-transform: uppercase;
  }

  .block p {
    font-size: 0.82rem;
    font-weight: 300;
    color: #555;
    margin-bottom: 14px;
  }

  /* coverage list */
  .list-item {
    font-size: 0.8rem;
    color: #777;
    padding: 7px 0;
    display: flex;
    align-items: baseline;
    gap: 10px;
    transition: color 0.2s, padding-left 0.2s;
  }

  .list-item .bullet {
    color: #ddd;
    flex-shrink: 0;
    transition: color 0.2s;
  }

  .list-item:hover .bullet { color: #111; }
  .list-item:hover { color: #222; padding-left: 4px; }

  /* writings */
  .entry {
    padding: 11px 0;
    border-bottom: 1px solid #f0f0f0;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 12px;
    font-size: 0.8rem;
    transition: padding-left 0.2s;
  }

  .entry:last-child { border-bottom: none; }
  .entry:hover { padding-left: 8px; }

  .entry a {
    color: #444;
    text-decoration: none;
    transition: color 0.2s;
  }

  .entry a:hover { color: #000; }

  .entry .d {
    color: #ccc;
    white-space: nowrap;
    font-size: 0.72rem;
  }

  .substack-note {
    font-size: 0.75rem;
    color: #bbb;
    margin-bottom: 16px;
  }

  .substack-note a {
    color: #888;
    text-decoration: none;
    border-bottom: 1px solid transparent;
    transition: color 0.2s, border-color 0.2s;
  }

  .substack-note a:hover { color: #111; border-bottom-color: #111; }

  /* links */
  .link-row {
    display: flex;
    gap: 28px;
    flex-wrap: wrap;
  }

  .link-row a {
    font-size: 0.78rem;
    color: #999;
    text-decoration: none;
    transition: color 0.2s;
    position: relative;
  }

  .link-row a::before {
    content: '\2192\00a0';
    color: #ddd;
    transition: color 0.2s;
  }

  .link-row a::after {
    content: '';
    position: absolute;
    bottom: -2px;
    left: 1.2em;
    right: 0;
    height: 1px;
    background: #111;
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.25s ease-out;
  }

  .link-row a:hover { color: #111; }
  .link-row a:hover::before { color: #111; }
  .link-row a:hover::after { transform: scaleX(1); }

  /* CTA */
  .cta {
    margin-top: 56px;
    padding: 24px;
    background: #f5f5f5;
    border: 1px solid #ebebeb;
    border-radius: 4px;
    font-size: 0.82rem;
    font-weight: 300;
    color: #555;
    line-height: 1.7;
    opacity: 0;
    animation: sectionIn 0.5s ease-out 0.55s forwards;
  }

  .cta a {
    color: #111;
    text-decoration: none;
    font-weight: 400;
    border-bottom: 1px solid #ccc;
    transition: border-color 0.2s;
  }

  .cta a:hover { border-bottom-color: #111; }

  /* mobile */
  @media (max-width: 600px) {
    .screen { padding: 32px 16px 80px; }
    .topbar .handle { font-size: 1.1rem; }
    .entry { flex-direction: column; gap: 2px; }
    .block { margin-bottom: 44px; }
  }
</style>
</head>
<body>

<div class="screen" id="site"></div>

<script>
// ═══════════════════════════════════════════════════════════════
// CONFIG — edit your content here
// ═══════════════════════════════════════════════════════════════
const CONFIG = {
  handle: "0xsloane",

  bio: [
    "Liquid trader and venture investor at RockawayX, a crypto-native fund. On the liquid side, I cover tokens and crypto-adjacent equities across directional and long/short strategies.",
    "On the venture side, I invest in early-stage crypto ventures; from AI x Crypto, DeFi, Payments and iGaming.",
    "I share my thoughts on X and Sloane Street, my Substack.",
    "My background is in on-chain analytics, product data science, and causal inference.",
  ],

   disclaimer: [
    "Note that all views are my own and do not represent any company. None of this is investment advice and is for informational purposes only.",
  ],

  coverage: [
    "Crypto Tokens",
    "Crypto-Adjacent Equities",
    "AI \u00d7 Crypto Intersection",
    "Stablecoin Infrastructure",
    "On-Chain Perps",
    "DeFi & Yield Protocols",
    "Market Microstructure",
  ],

  // Writings link to your Substack. Set the URL for each entry, or leave blank to default to Substack home.
  substack: "https://sloanestreet.substack.com/",
  writings: [
    { title: "Learnings from Investing in Crypto Gambling", date: "2026.04", url: "" },
  ],

  links: [
    { label: "x.com/0xsloane",    url: "https://x.com/0xsloane" },
    { label: "Substack",          url: "https://sloanestreet.substack.com/" },
    { label: "Dune",              url: "https://dune.com/0xsloane" },
  ],

  cta: "If you're building in crypto, or want to pitch me a liquid trade, reach out on <a href=\"https://x.com/0xsloane\" target=\"_blank\" rel=\"noopener\">X</a> \u2014 DMs are open.",
};
// ═══════════════════════════════════════════════════════════════
// END CONFIG — edit above, layout below
// ═══════════════════════════════════════════════════════════════

function render() {
  const el = document.getElementById('site');

  el.innerHTML = `
    <div class="topbar">
      <span class="handle">${CONFIG.handle}</span>
    </div>

    <div class="block">
      <div class="block-header">Bio</div>
      ${CONFIG.bio.map(p => `<p>${p}</p>`).join('')}
    </div>

    <div class="block">
      <div class="block-header">Coverage</div>
      ${CONFIG.coverage.map(c => `
        <div class="list-item"><span class="bullet">\u251C\u2500\u2500</span> ${c}</div>
      `).join('')}
    </div>

    <div class="block">
      <div class="block-header">Selected Writing</div>
      <div class="substack-note">Published on <a href="${CONFIG.substack}" target="_blank" rel="noopener">Sloane Street</a></div>
      ${CONFIG.writings.map(w => {
        const href = w.url || CONFIG.substack;
        return `
        <div class="entry">
          <a href="${href}" target="_blank" rel="noopener">${w.title}</a>
          <span class="d">${w.date}</span>
        </div>`;
      }).join('')}
    </div>

    <div class="block">
      <div class="block-header">Links</div>
      <div class="link-row">
        ${CONFIG.links.map(l => `<a href="${l.url}" target="_blank" rel="noopener">${l.label}</a>`).join('')}
      </div>
    </div>

    <div class="cta">${CONFIG.cta}</div>
  `;

}

render();
</script>
</body>
</html>
